{% extends "base.html" %}

{% block title %}Hosts{% endblock %}
{% block page_title %}Hosts{% endblock %}

{% block content %}
<!-- Search & Filter -->
<div class="search-wrap">
    <input type="text" class="search-input" id="hostSearch" placeholder="Search hosts...">
    <select class="filter-select" id="subnetFilter">
        <option value="">All subnets</option>
    </select>
</div>

<!-- Table -->
<table class="table-minimal" id="hostsTable">
    <thead>
        <tr>
            <th data-sort="ip">IP</th>
            <th data-sort="hostname">Hostname</th>
            <th data-sort="os">OS</th>
            <th data-sort="port_count">Ports</th>
            <th data-sort="last_seen">Last Seen</th>
            <th></th>
        </tr>
    </thead>
    <tbody id="hostsTableBody">
        <tr><td colspan="6" class="empty-state">Loading...</td></tr>
    </tbody>
</table>

<!-- Pagination -->
<div class="pagination" id="paginationBar">
    <span id="pageInfo"></span>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var currentPage = 1;
    var perPage = 50;
    var currentQuery = '';
    var currentSubnet = '';
    var currentSort = 'last_seen';
    var currentOrder = 'desc';
    var debounceTimer = null;
    var openMenu = null;

    var searchInput = document.getElementById('hostSearch');
    var subnetFilter = document.getElementById('subnetFilter');
    var tbody = document.getElementById('hostsTableBody');
    var paginationBar = document.getElementById('paginationBar');

    searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
            currentQuery = searchInput.value.trim();
            currentPage = 1;
            fetchHosts();
        }, 400);
    });

    subnetFilter.addEventListener('change', function() {
        currentSubnet = subnetFilter.value;
        currentPage = 1;
        fetchHosts();
    });

    document.querySelectorAll('#hostsTable th[data-sort]').forEach(function(th) {
        th.style.cursor = 'pointer';
        th.addEventListener('click', function() {
            var field = th.getAttribute('data-sort');
            if (currentSort === field) {
                currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort = field;
                currentOrder = 'asc';
            }
            currentPage = 1;
            fetchHosts();
        });
    });

    function fetchHosts() {
        var url = '/api/hosts?page=' + currentPage + '&per_page=' + perPage;
        if (currentQuery) url += '&q=' + encodeURIComponent(currentQuery);
        if (currentSubnet) url += '&subnet=' + encodeURIComponent(currentSubnet);
        if (currentSort) url += '&sort=' + currentSort + '&order=' + currentOrder;

        fetch(url)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                renderTable(data.hosts || []);
                var pg = data.pagination || {};
                renderPagination(pg.total || 0, pg.page || 1, pg.per_page || perPage);
                renderSubnets(data.subnets || []);
            })
            .catch(function() {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Failed to load hosts</td></tr>';
            });
    }

    function renderTable(hosts) {
        if (hosts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No hosts found. Run a discovery scan.</td></tr>';
            return;
        }
        var html = '';
        hosts.forEach(function(h) {
            var ipClass = h.is_active ? '' : ' inactive';
            html += '<tr>'
                + '<td><a href="/hosts/' + encodeURIComponent(h.ip) + '" class="ip-link' + ipClass + '">' + escapeHtml(h.ip) + '</a></td>'
                + '<td>' + escapeHtml(h.hostname || '\u2014') + '</td>'
                + '<td class="text-secondary">' + escapeHtml(h.os || '\u2014') + '</td>'
                + '<td class="mono">' + (h.port_count || 0) + '</td>'
                + '<td class="mono text-muted text-sm">' + escapeHtml((h.last_seen || '').substring(0, 16) || '\u2014') + '</td>'
                + '<td>' + renderActions(h.ip) + '</td>'
                + '</tr>';
        });
        tbody.innerHTML = html;
    }

    function renderActions(ip) {
        return '<div class="action-dropdown">'
            + '<button class="action-trigger" onclick="toggleMenu(event, this)"><i class="bi bi-three-dots"></i></button>'
            + '<div class="action-menu">'
            + '<a href="/hosts/' + encodeURIComponent(ip) + '">View</a>'
            + '<button onclick="scanHost(\'' + escapeHtml(ip) + '\', \'scan\')">Scan</button>'
            + '<button onclick="scanHost(\'' + escapeHtml(ip) + '\', \'nuclei\')">Nuclei</button>'
            + '</div></div>';
    }

    function renderPagination(total, page, pp) {
        var totalPages = Math.ceil(total / pp);
        if (totalPages <= 1) {
            paginationBar.innerHTML = '<span>' + total + ' hosts</span>';
            return;
        }
        var html = '<button onclick="hvGoPage(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>Prev</button>';
        html += '<span>Page ' + page + ' of ' + totalPages + '</span>';
        html += '<button onclick="hvGoPage(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>Next</button>';
        paginationBar.innerHTML = html;
    }

    function renderSubnets(subnets) {
        var current = subnetFilter.value;
        if (subnetFilter.options.length - 1 === subnets.length) return;
        var html = '<option value="">All subnets</option>';
        subnets.forEach(function(s) {
            var subnet = s.subnet || s;
            var count = s.count || '';
            var label = count ? subnet + ' (' + count + ')' : subnet;
            html += '<option value="' + escapeHtml(subnet) + '"' + (subnet === current ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
        });
        subnetFilter.innerHTML = html;
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    window.hvGoPage = function(page) {
        currentPage = page;
        fetchHosts();
    };

    window.toggleMenu = function(e, btn) {
        e.stopPropagation();
        var menu = btn.nextElementSibling;
        if (openMenu && openMenu !== menu) openMenu.classList.remove('show');
        menu.classList.toggle('show');
        openMenu = menu.classList.contains('show') ? menu : null;
    };

    window.scanHost = function(ip, type) {
        if (openMenu) { openMenu.classList.remove('show'); openMenu = null; }
        fetch('/api/hosts/' + encodeURIComponent(ip) + '/scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({scan_type: type})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) alert('Error: ' + data.error);
            else alert((type === 'nuclei' ? 'Nuclei' : 'Scan') + ' started for ' + ip);
        })
        .catch(function(err) { alert('Failed: ' + err.message); });
    };

    document.addEventListener('click', function() {
        if (openMenu) { openMenu.classList.remove('show'); openMenu = null; }
    });

    fetchHosts();
})();
</script>
{% endblock %}
